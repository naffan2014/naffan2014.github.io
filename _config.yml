# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# 插件(jekyll-redirect-from 用于旧 URL 301 重定向到新 URL)
plugins:
  - jekyll-redirect-from

# 站点语言 › http://www.lingoes.net/en/translator/langcode.htm
lang: zh-CN

# 时区 › https://zones.arilyn.cc
timezone: Asia/Shanghai

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: 拿饭网 # the main title

tagline: 一个属于自己的博客网站 # it will display as the subtitle

description: >- # used by seo meta and the atom feed
  拿饭网是一个私人博客系统,采用 jekyll 博客系统部署在 GitHub-Pages 服务上。拿饭网内的文章均出自作者,作者以技术为导向同时兼顾自己的生活与对经济的观点。

# 站点协议 & 主机名,结尾不要带 '/'
url: "https://naffan.cn"

github:
  username: naffan2014 # change to your GitHub username

twitter:
  username: naffan2011 # change to your Twitter username

social:
  # 显示为默认作者与页脚版权所有人
  name: 张一帆
  email: naffan2012@icloud.com
  fediverse_handle: # fill in your fediverse handle. E.g. "@username@domain.com"
  links:
    # 第一个元素作为版权所有者链接
    - https://twitter.com/naffan2011
    - https://github.com/naffan2014
    - http://weibo.com/208125151

# Site Verification Settings
webmaster_verifications:
  google: # fill in your Google verification code
  bing: # fill in your Bing verification code
  alexa: # fill in your Alexa verification code
  yandex: # fill in your Yandex verification code
  baidu: # fill in your Baidu verification code
  facebook: # fill in your Facebook verification code

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings
analytics:
  google:
    id: # fill in your Google Analytics ID (GA4 格式 G-XXXXXXX)
  goatcounter:
    id: # fill in your GoatCounter ID
  umami:
    id: # fill in your Umami ID
    domain: # fill in your Umami domain
  matomo:
    id: # fill in your Matomo ID
    domain: # fill in your Matomo domain
  cloudflare:
    id: # fill in your Cloudflare Web Analytics token
  fathom:
    id: # fill in your Fathom Site ID

# Page views settings
pageviews:
  provider: # now only supports 'goatcounter'

# 主题配色方案,留空跟随系统,可填 [light | dark]
theme_mode: # [light | dark]

# CDN endpoint for media resources.
cdn:

# 侧边栏头像,支持本地或 CORS 资源
avatar: /images/self.jpg

# 站点级社交预览图,用于 SEO `og:image` meta 标签
# 可被文章 front matter 的 `page.image` 覆盖
social_preview_image: # string, local or CORS resources

# 全局开关:文章目录(TOC)
toc: true

actions:
  # 在每篇文章显示"编辑此文章"按钮
  edit_post:
    enabled: false
    url: "" # repository base URL
    static_url: false

comments:
  # 评论系统全局开关,留空表示禁用
  provider: giscus # [disqus | utterances | giscus]
  # Disqus settings
  disqus:
    shortname: # fill with the Disqus shortname.
  # utterances settings › https://utteranc.es/
  utterances:
    repo: # <gh-username>/<repo>
    issue_term: # < url | pathname | title | ...>
  # Giscus options › https://giscus.app
  giscus:
    repo: naffan2014/naffan2014.github.io
    repo_id: MDEwOlJlcG9zaXRvcnkzODQxOTI1Mw==
    category: General
    category_id: MDE4OkRpc2N1c3Npb25DYXRlZ29yeTMyNTQ3MTg2
    mapping: title
    strict: 0
    input_position: bottom
    lang: zh-CN
    reactions_enabled: 1

# Self-hosted static assets, optional
assets:
  self_host:
    enabled: # boolean, keep empty means false
    env: # [development | production]

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10
# 分页路径:带尾斜杠,让链接 /page2/ 与目录 page2/index.html 匹配。
# 不带斜杠时,又拍云对象存储不做 301 重定向,会返回 503。
paginate_path: /page:num/

# 站点 base URL
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # 文章永久链接结构
      # 文件名为 YYYY-MM-DD-N.md, :title 取的是 N(序号),会冲突
      # 改用日期+标题(序号)组合,保证唯一
      permalink: /posts/:year-:month-:day-:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - Dockerfile
  - docker-compose.yml
  - .dockerignore
  - publish-gh-pages.sh
  - Gemfile
  - Gemfile.lock

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
